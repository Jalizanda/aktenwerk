<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aktenwerk — Demnächst verfügbar</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: #0B1220;
    color: #E8EAF0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    text-align: center;
  }
  img.logo { height: 52px; }
  h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; }
  p { color: #8B93A8; font-size: 1rem; max-width: 36ch; line-height: 1.6; }
  a.cta {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.65rem 1.5rem;
    background: #2563EB;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: background 0.15s;
  }
  a.cta:hover { background: #1D4ED8; }
</style>
</head>
<body>
  <img src="logo.svg" alt="Aktenwerk" class="logo">
  <h1>Demnächst verfügbar</h1>
  <p>Die Website wird gerade überarbeitet und ist in Kürze wieder online.</p>
  <a href="https://app.aktenwerk.de" class="cta">Zur App →</a>
</body>
</html>
