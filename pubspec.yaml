name: aktenwerk
description: "Aktenwerk – Bausachverständigen-Verwaltung (Akten, Gutachten, Rechnungen, Angebote)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.6.2

  # --- Persistence (Drift / SQLite) ---
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # --- Utilities ---
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0
  equatable: ^2.0.7

  # --- Rich-Text Editor (Gutachten) ---
  flutter_quill: ^11.5.0

  # --- PDF / Printing ---
  pdf: ^3.11.1
  printing: ^5.13.4

  # --- File I/O / Import-Export ---
  file_picker: ^8.1.6
  share_plus: ^10.1.2

  # --- Network (Geocoding, Open-Meteo, OpenPLZ) ---
  http: ^1.2.2
  dio: ^5.7.0

  # --- Settings ---
  shared_preferences: ^2.3.3

  # --- Charts (Auswertung) ---
  fl_chart: ^0.69.2

  # --- Image / Fotos ---
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  exif: ^3.3.0

  # --- Misc ---
  url_launcher: ^6.3.1

  # --- Design ---
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # --- Firebase ---
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
