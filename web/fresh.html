<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aktenwerk – Cache leeren</title>
  <style>
    html, body { height: 100%; margin: 0; background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0f172a; }
    .box { display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; height: 100%; padding: 24px; text-align: center; }
    .spin { width: 36px; height: 36px; border: 3px solid #e2e8f0;
      border-top-color: #f97316; border-radius: 50%;
      animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; font-weight: 700; margin: 0; }
    p { margin: 0; color: #64748b; font-size: 14px; max-width: 420px; line-height: 1.5; }
    code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px;
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 12px; }
    a { color: #f97316; text-decoration: none; font-weight: 600; }
    .log { font-family: monospace; font-size: 11px; color: #64748b;
      max-width: 420px; text-align: left; padding: 12px; background: #e2e8f0;
      border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <h1>Cache wird aufgeräumt …</h1>
    <p>Alte Service-Worker und Zwischenspeicher werden entfernt, damit die aktuelle Version von Aktenwerk laden kann. Das dauert nur wenige Sekunden.</p>
    <div id="log" class="log"></div>
    <p id="done" style="display:none">
      Fertig! Du wirst weitergeleitet …<br>
      Falls nicht: <a href="/">→ Aktenwerk öffnen</a>
    </p>
  </div>
  <script>
    const log = (msg) => {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
    };
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          // Tombstone-SW installieren: überschreibt alten Flutter-SW,
          // löscht alle Caches, nimmt Kontrolle über alle Tabs und
          // meldet sich dann selbst ab. Einziger zuverlässiger Weg,
          // den alten SW deaktiv zu bekommen ohne Browser-Daten-Löschung.
          log('Tombstone-Service-Worker wird installiert …');
          try {
            const reg = await navigator.serviceWorker.register(
              '/tombstone-sw.js?cb=' + Date.now(),
              { scope: '/' }
            );
            log('  · registriert: ' + (reg.scope || ''));
            await new Promise((resolve) => {
              const to = setTimeout(resolve, 5000);
              const check = () => {
                if (reg.active) { clearTimeout(to); resolve(); }
              };
              check();
              (reg.installing || reg.waiting)?.addEventListener(
                'statechange',
                () => check()
              );
            });
            log('  · aktiv');
          } catch (e) {
            log('  · Tombstone-Fehler: ' + e);
          }
          const regs = await navigator.serviceWorker.getRegistrations();
          log('Service-Worker zusätzlich abmelden: ' + regs.length);
          for (const r of regs) {
            try {
              await r.unregister();
              log('  · abgemeldet: ' + (r.scope || ''));
            } catch (e) { log('  · Fehler: ' + e); }
          }
        } else {
          log('Service-Worker: nicht unterstützt');
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          log('Caches gefunden: ' + keys.length);
          for (const k of keys) {
            try {
              await caches.delete(k);
              log('  · gelöscht: ' + k);
            } catch (e) { log('  · Fehler: ' + e); }
          }
        }
        // HTTP-Cache des Browsers kann man nicht direkt leeren. Aber mit
        // `cache: 'reload'` fetchen wir die kritischen Flutter-Dateien
        // einmal am Cache vorbei — der Browser schreibt die frischen
        // Versionen in den Cache und benutzt die beim nächsten Request.
        log('');
        log('Flutter-Assets neu laden (am HTTP-Cache vorbei) …');
        const assets = [
          '/',
          '/flutter_bootstrap.js',
          '/flutter.js',
          '/main.dart.js',
          '/flutter_service_worker.js',
          '/manifest.json',
          '/version.json',
        ];
        for (const url of assets) {
          try {
            const r = await fetch(url + '?cb=' + Date.now(), { cache: 'reload' });
            log('  · ' + url + '  →  ' + r.status);
          } catch (e) {
            log('  · ' + url + '  →  Fehler: ' + e);
          }
        }
        log('');
        log('Fertig.');
        document.getElementById('done').style.display = 'block';
        setTimeout(() => {
          // location.replace mit eigenem Token vermeidet Back-Button-Schleife.
          location.replace('/?fresh=' + Date.now());
        }, 2000);
      } catch (e) {
        log('Unerwarteter Fehler: ' + e);
      }
    })();
  </script>
</body>
</html>
