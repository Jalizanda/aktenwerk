  <!-- Geist / Geist Mono (Aktenwerk Design v1) -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #FAFAF7; }
    body { font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #FAFAF7; z-index: 2147483647;
      transition: opacity 180ms ease-out;
    }
    #splash .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(11,18,32,0.08);
      border-top-color: #F25C1F; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    // Service-Worker sind in Aktenwerk deaktiviert (Flutter-Build mit
    // --pwa-strategy=none). Falls ein alter SW noch die Seite bedient,
    // melden wir ihn ab, löschen alle App-Caches und laden die Seite
    // genau EINMAL pro Session frisch neu — so entgeht das Frontend
    // garantiert der alten Cache-Version.
    (function selfHeal() {
      if (!('serviceWorker' in navigator)) return;
      const RELOAD_FLAG = 'aktenwerk_sw_purged_reload_v1';
      try {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          if (regs.length === 0) return;
          const alreadyReloaded = sessionStorage.getItem(RELOAD_FLAG);
          const unregisters = regs.map((r) => {
            try { return r.unregister(); } catch (e) { return null; }
          }).filter(Boolean);
          const cacheCleanup = 'caches' in window
            ? caches.keys().then((keys) =>
                Promise.all(keys.map((k) => caches.delete(k))))
            : Promise.resolve();
          Promise.all([...unregisters, cacheCleanup]).then(() => {
            if (!alreadyReloaded) {
              sessionStorage.setItem(RELOAD_FLAG, '1');
              // Cache-Buster, damit Browser garantiert frische HTML-Version zieht.
              const sep = location.href.includes('?') ? '&' : '?';
              location.replace(location.href.split('#')[0] + sep + '__fresh=' + Date.now());
            }
          });
        });
      } catch (e) { /* silent */ }
    })();
  </script>
</head>
<body>
  <div id="splash"><div class="spinner"></div></div>
  <script>
    // Splash entfernen, sobald Flutter den ersten Frame gezeichnet hat.
    window.addEventListener('flutter-first-frame', () => {
      const s = document.getElementById('splash');
      if (!s) return;
      s.style.opacity = '0';
      setTimeout(() => s.remove(), 200);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
