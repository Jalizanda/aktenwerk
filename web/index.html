<!DOCTYPE html>
<html lang="de">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aktenwerk · Bausachverständigen-Verwaltung von Alexander Höpken — Akten, Gutachten, Rechnungen, Angebote">
  <meta name="theme-color" content="#0f172a">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Aktenwerk">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Aktenwerk – Sachverständigen-Suite</title>
  <link rel="manifest" href="manifest.json">

  <!-- Inter preload für schnelleren Font-Swap (gleiche Quelle wie google_fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f8fafc; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #f8fafc; z-index: 2147483647;
      transition: opacity 180ms ease-out;
    }
    #splash .spinner {
      width: 28px; height: 28px; border: 3px solid #e2e8f0;
      border-top-color: #f97316; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    // Service-Worker sind in Aktenwerk deaktiviert (Flutter-Build mit
    // --pwa-strategy=none). Dieser Block räumt alte Registrierungen und
    // App-Shell-Caches auf jedem Seitenaufruf auf — damit fängt kein
    // veralteter SW eines früheren Deploys mehr die `index.html` ab.
    (function selfHeal() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((regs) => {
            regs.forEach((r) => { try { r.unregister(); } catch (e) {} });
          });
        }
        if ('caches' in window) {
          caches.keys().then((keys) => {
            keys.forEach((k) => {
              const low = k.toLowerCase();
              if (low.includes('flutter') || low.includes('aktenwerk') ||
                  low.includes('app-shell')) {
                caches.delete(k);
              }
            });
          });
        }
      } catch (e) { /* silent */ }
    })();
  </script>
</head>
<body>
  <div id="splash"><div class="spinner"></div></div>
  <script>
    // Splash entfernen, sobald Flutter den ersten Frame gezeichnet hat.
    window.addEventListener('flutter-first-frame', () => {
      const s = document.getElementById('splash');
      if (!s) return;
      s.style.opacity = '0';
      setTimeout(() => s.remove(), 200);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
